events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # ── Global security headers (applied to every response) ──────────────────
    add_header X-Content-Type-Options       "nosniff"                         always;
    add_header X-Frame-Options              "SAMEORIGIN"                      always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin"                     always;

    # ── Upstreams ─────────────────────────────────────────────────────────────
    upstream odoo_backend   { server web:8069; }
    upstream moodle_backend { server moodle:8080; }

    # ── Catch-all HTTP → HTTPS redirect (raw IP or unknown host) ─────────────
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://20-205-189-96.sslip.io$request_uri;
    }

    # ── Catch-all HTTPS → canonical host redirect ─────────────────────────────
    server {
        listen 443 ssl default_server;
        server_name _;
        ssl_certificate     /etc/letsencrypt/live/20-205-189-96.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/20-205-189-96.sslip.io/privkey.pem;
        return 301 https://20-205-189-96.sslip.io$request_uri;
    }

    # ── Moodle HTTP (8080) → HTTPS (8443) redirect ────────────────────────────
    server {
        listen 8080;
        server_name _;
        return 301 https://20-205-189-96.sslip.io:8443$request_uri;
    }

    # ════════════════════════════════════════════════════════════════════════
    # ODOO — HTTPS on port 443
    # ════════════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl;
        server_name 20-205-189-96.sslip.io;

        ssl_certificate     /etc/letsencrypt/live/20-205-189-96.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/20-205-189-96.sslip.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains"                                                                                                        always;
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
        add_header X-Content-Type-Options       "nosniff"                                                                                                                                    always;
        add_header X-Frame-Options              "SAMEORIGIN"                                                                                                                                 always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"                                                                                                            always;
        add_header Cross-Origin-Resource-Policy "same-origin"                                                                                                                                always;

        proxy_read_timeout    720s;
        proxy_connect_timeout 720s;
        proxy_send_timeout    720s;

        location / {
            proxy_pass         http://odoo_backend;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  https;
            proxy_redirect     off;
        }

        location /longpolling {
            proxy_pass         http://odoo_backend;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  https;
        }
    }

    # ════════════════════════════════════════════════════════════════════════
    # MOODLE — HTTPS on port 8443
    # ════════════════════════════════════════════════════════════════════════
    server {
        listen 8443 ssl;
        server_name 20-205-189-96.sslip.io;

        ssl_certificate     /etc/letsencrypt/live/20-205-189-96.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/20-205-189-96.sslip.io/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security    "max-age=63072000; includeSubDomains"                                                                                                        always;
        add_header Content-Security-Policy      "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self';" always;
        add_header X-Content-Type-Options       "nosniff"                                                                                                                                    always;
        add_header X-Frame-Options              "SAMEORIGIN"                                                                                                                                 always;
        add_header Referrer-Policy              "strict-origin-when-cross-origin"                                                                                                            always;
        add_header Cross-Origin-Resource-Policy "same-origin"                                                                                                                                always;

        location / {
            proxy_pass         http://moodle_backend;
            proxy_set_header   Host               $host:8443;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  https;
            proxy_redirect     off;
        }
    }
}
