events {
    worker_connections 1024;
}

http {
    server_tokens off;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    upstream odoo_backend {
        server web:8069;
    }

    # Catch-all: redirect raw IP to sslip.io domain (HTTP)
    server {
        listen 80 default_server;
        server_name _;
        return 301 https://20-205-189-96.sslip.io$request_uri;
    }

    # Catch-all: redirect raw IP to sslip.io domain (HTTPS)
    # Uses a self-signed snakeoil cert just to handle the TLS handshake
    # before redirecting - browsers will briefly show warning then redirect
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/20-205-189-96.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/20-205-189-96.sslip.io/privkey.pem;

        return 301 https://20-205-189-96.sslip.io$request_uri;
    }

    # HTTP -> HTTPS redirect for sslip.io domain
    server {
        listen 80;
        server_name 20-205-189-96.sslip.io;
        return 301 https://$host$request_uri;
    }

    # HTTPS server for sslip.io domain
    server {
        listen 443 ssl;
        server_name 20-205-189-96.sslip.io;

        ssl_certificate /etc/letsencrypt/live/20-205-189-96.sslip.io/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/20-205-189-96.sslip.io/privkey.pem;

        # Strong SSL settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        # HSTS
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        client_max_body_size 100M;

        location / {
            proxy_pass http://odoo_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 720s;
            proxy_connect_timeout 720s;
            proxy_send_timeout 720s;
        }
    }
}
